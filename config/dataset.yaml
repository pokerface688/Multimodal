amazon:
  data_format: pkl
  data_path: /data/run01/scxi244/EVENT/eventsfm/data/amazon/train.pkl
  weight: 1.0
  num_event_types: 16
  type_descriptions:
    '0': "亚马逊购物序列数据集的0号事件类型表示用户购买服饰类商品，涵盖上衣、裤装、外套等日常穿着。"
    '1': "亚马逊购物序列数据集的1号事件类型表示用户购买鞋靴类商品，包含运动鞋、休闲鞋、正装鞋等。"
    '2': "亚马逊购物序列数据集的2号事件类型表示用户购买配饰类商品，如围巾、帽子、腰带等。"
    '3': "亚马逊购物序列数据集的3号事件类型表示用户购买珠宝类商品，如项链、戒指、耳环等。"
    '4': "亚马逊购物序列数据集的4号事件类型表示用户购买新奇或特色商品，以及难以归类的其他商品。"
    '5': "亚马逊购物序列数据集的5号事件类型表示用户购买手表类商品。"
    '6': "亚马逊购物序列数据集的6号事件类型表示用户购买制服、工装或安全防护类服饰。"
    '7': "亚马逊购物序列数据集的7号事件类型表示用户购买行李箱或旅行相关装备。"
    '8': "亚马逊购物序列数据集的8号事件类型表示用户购买演出服装或相关配件。"
    '9': "亚马逊购物序列数据集的9号事件类型表示用户购买女童服饰类商品。"
    '10': "亚马逊购物序列数据集的10号事件类型表示用户购买男童服饰类商品。"
    '11': "亚马逊购物序列数据集的11号事件类型表示用户购买鞋类、珠宝或手表的配件，如鞋垫、表带、首饰盒等。"
    '12': "亚马逊购物序列数据集的12号事件类型表示用户购买婴幼儿服饰或用品。"
    '13': "亚马逊购物序列数据集的13号事件类型表示用户购买手提包或钱包类商品。"
    '14': "亚马逊购物序列数据集的14号事件类型表示用户购买冲浪、滑板或街头风格相关服饰与用品。"
    '15': "亚马逊购物序列数据集的15号事件类型表示用户购买其他特殊类别商品，如设计师品牌、大码服饰、孕妇装、传统或民族服饰等。"

