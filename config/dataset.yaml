    '2': "XTraffic 数据集的 2 号事件类型表示 CarFire（车辆火灾）。"
    '3': "XTraffic 数据集的 3 号事件类型表示 Fire（火灾无伤亡；原始标签为 Fire，对应你所说的 Fire NoInj）。"
