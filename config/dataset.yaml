  data_format: pkl
  data_path: ../temp/Danmaku/Events/train.pkl
  weight: 1.0
  num_event_types: 9
  type_descriptions:
    '0': "哔哩哔哩弹幕数据集的0号事件类型表示个人经历/感受（分享自身故事、情绪、体验）"
    '1': "哔哩哔哩弹幕数据集的1号事件类型表示刷屏（重复内容、无意义刷屏、刷节奏）"
    '2': "哔哩哔哩弹幕数据集的2号事件类型表示无关内容/跑题（和视频内容无关）"
    '3': "哔哩哔哩弹幕数据集的3号事件类型表示无意义文本（乱码、乱打、无实际含义）"
    '4': "哔哩哔哩弹幕数据集的4号事件类型表示引用/复述（引用台词、歌词、他人发言）"
    '5': "哔哩哔哩弹幕数据集的5号事件类型表示幽默/梗（搞笑、玩梗、段子、趣味评论）"
    '6': "哔哩哔哩弹幕数据集的6号事件类型表示批评评论（吐槽、质疑、负面评价）"
    '7': "哔哩哔哩弹幕数据集的7号事件类型表示提问（询问信息、剧情、细节、原因）"
    '8': "哔哩哔哩弹幕数据集的8号事件类型表示社交互动（打招呼、互动聊天、感谢、应援）"
    
