# runner.py
seed: 1037
opt_lr: 5.e-4  # AdamW主学习率
lora_lr: 5.e-5
weight_decay: 0.01
epoch: 50
batch_size: 64  # 可适当增大（非文本序列）
train_subset_ratio: 1.0
patience: 3
valid_freq: 1

# model.py
model_path: ../../../../LLM/
use_image: False
use_text: False
model_name: Qwen2-0.5B
peft_type: lora  # 或 'freeze'
lora_rank: 8  # 仅q,v矩阵
num_mixture: 2  # MixLogNormal组件数
use_mixlognormal: false  # true使用似然估计，false使用Huber回归
tem_enc_type: TimePositionEncoding
# MoIR：融合后、emb_up 前，在「融合事件嵌入」与「时间编码」两路同维序列间路由（官方默认超参）
use_moir_post_fusion: false
moir_exchange_ratio: 0.10
moir_top_q: 64
moir_token_subsample: 256
moir_init_alpha: 0.5
moir_symmetric: true
type_embeddings_path: ./embed
use_quantization: true
use_prompt: false
time2vec_k: 64
time_scale: 1
loss_ratio: 1.0
RCA_ratio: 0.0
JEPA_ratio: 0.0
RCA_type: binary

# DecAlign 事件序列融合（需 tem_enc_type: TimePositionEncoding；默认关闭）
use_decalign: false
lambda_decalign_dec: 0.0
lambda_decalign_hete: 0.0
lambda_decalign_homo: 0.0
decalign_d_model: 64
decalign_num_heads: 4
decalign_nlevels: 2
decalign_num_prototypes: 10
decalign_conv1d_kernel_size: 1
decalign_attn_dropout: 0.1
decalign_attn_dropout_a: 0.1
decalign_attn_dropout_v: 0.1
decalign_lambda_ot: 0.1
decalign_ot_num_iters: 50

prompt: "请你以自回归的形式预测这个事件序列的下一事件。"